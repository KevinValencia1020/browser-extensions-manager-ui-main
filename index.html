<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">

  <script src="main.js" defer></script>

  <title>Browser extensions manager UI</title>
</head>

<body>

  <header class="header">
    <div class="header_main">
      <img src="./assets/images/logo.svg" alt="Logo" class="header_logo">
      <button class="header_btn">
        <img src="./assets/images/icon-moon.svg" alt="icon-moon" class="header_btn--icon">
      </button>
    </div>
  </header>

  <main class="main">
    <nav class="main_nav">
      <h2 class="main_nav--title">Extensions List</h2>
      <div class="main_nav--filters">
        <button class="main_nav--filters--btn">All</button>
        <button class="main_nav--filters--btn">Active</button>
        <button class="main_nav--filters--btn">Inactive</button>
      </div>
    </nav>

    <div id="extensions-container"></div>
  </main>

</body>

</html>
